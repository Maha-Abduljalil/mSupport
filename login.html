<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | QuickSupport</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body
    class="bg-matcha-50 min-h-screen flex items-center justify-center p-4 font-sans"
  >
    <div class="w-full max-w-sm">
      <div class="text-center mb-10">
        <a href="/" class="inline-flex items-center gap-2 mb-4">
          <img src="/imgs/icon.png" alt="Logo" class="w-14 h-14 object-contain" />
          <span class="text-2xl font-bold text-slate-1000 tracking-tight">Support</span>
        </a>
        <h1
          id="auth-title"
          class="text-xl font-bold text-slate-900 uppercase tracking-widest"
        >
          Welcome Back
        </h1>
        <p
          id="auth-subtitle"
          class="text-slate-500 text-[10px] font-black uppercase tracking-widest mt-2"
        >
          Sign in to continue
        </p>
      </div>

      <div class="bg-white p-8 rounded-xl shadow-sm border border-matcha-200">
        <form id="auth-form" class="space-y-6">
          <div class="space-y-2">
            <label
              for="email"
              class="text-[9px] font-black uppercase tracking-widest text-slate-400 px-1"
              >Email</label
            >
            <input
              type="email"
              id="email"
              required
              placeholder="you@example.com"
              class="w-full px-4 py-2 bg-matcha-50 border border-matcha-200 rounded-lg focus:ring-1 focus:ring-matcha-500 outline-none transition-all placeholder:text-slate-300 text-sm font-medium"
            />
          </div>
          <div class="space-y-2">
            <label
              for="password"
              class="text-[9px] font-black uppercase tracking-widest text-slate-400 px-1"
              >Password</label
            >
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••"
              class="w-full px-4 py-2 bg-matcha-50 border border-matcha-200 rounded-lg focus:ring-1 focus:ring-matcha-500 outline-none transition-all placeholder:text-slate-300 text-sm font-medium"
            />
          </div>

          <div
            id="error-message"
            class="hidden text-red-500 text-[10px] font-bold text-center bg-red-50 p-2 rounded-lg border border-red-100 tracking-tight"
          ></div>

          <button
            type="submit"
            id="submit-btn"
            class="w-full bg-matcha-500 text-white font-bold py-3 rounded-lg hover:bg-matcha-600 transition-all text-xs uppercase tracking-widest shadow-md shadow-matcha-100"
          >
            Sign In
          </button>
        </form>

        <div class="mt-8 pt-6 border-t border-matcha-100 text-center">
          <p
            class="text-slate-400 text-[10px] font-bold uppercase tracking-widest"
          >
            <span id="toggle-text">Don't have an account?</span>
            <button
              id="toggle-auth"
              class="text-matcha-600 font-black hover:underline ml-1"
            >
              Sign Up
            </button>
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/auth.js"></script>
  </body>
</html>
